<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>墨灵 · AI写作伙伴 | 拟人化改写+最新模型</title>
    <style>
        /* 样式与之前完全一致，为节省篇幅已省略，实际使用时请保留原有全部 CSS */
        :root {
            --bg-primary: #faf8f5;
            --bg-secondary: #f0ede8;
            --bg-card: #ffffff;
            --bg-editor: #fdfcf9;
            --text-primary: #2c2416;
            --text-secondary: #6b5e4a;
            --text-muted: #9b8d7a;
            --accent: #c47f3b;
            --accent-light: #e8c9a0;
            --accent-glow: #f5e1c8;
            --border: #e5ded4;
            --border-light: #f0ebe2;
            --shadow-sm: 0 1px 3px rgba(44,36,22,0.06);
            --shadow-md: 0 4px 16px rgba(44,36,22,0.08);
            --shadow-lg: 0 12px 40px rgba(44,36,22,0.12);
            --radius-sm: 10px; --radius-md: 16px; --radius-lg: 24px;
            --font-editor: 'Georgia', 'Noto Serif SC', serif;
            --font-ui: 'Inter', 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:var(--font-ui); background:var(--bg-primary); color:var(--text-primary); min-height:100vh; display:flex; }
        .sidebar { width:280px; min-width:280px; height:100vh; background:var(--bg-card); border-right:1px solid var(--border); display:flex; flex-direction:column; position:sticky; top:0; z-index:100; box-shadow:var(--shadow-sm); }
        .sidebar-header { padding:24px 20px 16px; text-align:center; border-bottom:1px solid var(--border-light); }
        .ai-avatar-container { position:relative; width:90px; height:90px; margin:0 auto 14px; cursor:pointer; }
        .ai-avatar-circle { width:90px; height:90px; border-radius:50%; background:linear-gradient(145deg,#fdf3e4,#e8c9a0); display:flex; align-items:center; justify-content:center; box-shadow:0 6px 24px rgba(196,127,59,0.25); transition:all 0.4s; }
        .ai-avatar-circle.thinking { animation:avatarPulse 1.2s infinite; }
        .ai-avatar-circle.writing { animation:avatarGlow 0.8s infinite; }
        @keyframes avatarPulse { 50%{box-shadow:0 8px 36px rgba(196,127,59,0.45); transform:scale(1.03)} }
        @keyframes avatarGlow { 50%{box-shadow:0 8px 44px rgba(196,127,59,0.7)} }
        .ai-face { font-size:38px; }
        .ai-face::after { content:'😊'; }
        .ai-avatar-circle.thinking .ai-face::after { content:'🤔'; animation:faceTilt 1.5s infinite; }
        .ai-avatar-circle.writing .ai-face::after { content:'✍️'; animation:faceBounce 0.6s infinite; }
        @keyframes faceTilt { 25%{transform:rotate(-8deg)} 75%{transform:rotate(8deg)} }
        @keyframes faceBounce { 50%{transform:translateY(-6px)} }
        .ai-status-dot { position:absolute; bottom:4px; right:4px; width:16px; height:16px; border-radius:50%; background:#8bc34a; border:3px solid #fff; }
        .ai-status-dot.busy { background:#ff9800; animation:dotBlink 0.7s infinite; }
        @keyframes dotBlink { 50%{opacity:0.3} }
        .sidebar-nav { flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:4px; }
        .type-btn { display:flex; align-items:center; gap:10px; padding:12px 14px; border:none; background:transparent; border-radius:var(--radius-sm); cursor:pointer; font-size:0.9rem; color:var(--text-secondary); text-align:left; font-weight:500; }
        .type-btn:hover { background:var(--bg-secondary); }
        .type-btn.active { background:var(--accent-glow); color:var(--accent); font-weight:700; box-shadow:inset 0 0 0 2px var(--accent-light); }
        .sidebar-footer { padding:12px 16px; border-top:1px solid var(--border-light); display:flex; flex-direction:column; gap:8px; }
        .btn-outline { padding:10px 14px; border:1.5px solid var(--border); background:transparent; border-radius:var(--radius-sm); cursor:pointer; font-size:0.82rem; color:var(--text-secondary); display:flex; align-items:center; gap:8px; justify-content:center; }
        .btn-outline:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-glow); }
        .main-area { flex:1; display:flex; flex-direction:column; min-height:100vh; }
        .topbar { padding:16px 24px; display:flex; align-items:center; gap:12px; border-bottom:1px solid var(--border-light); background:var(--bg-card); position:sticky; top:0; z-index:50; flex-wrap:wrap; }
        .doc-title-input { flex:1; border:none; font-size:1.3rem; font-weight:700; background:transparent; outline:none; }
        .btn { padding:9px 18px; border-radius:24px; border:none; cursor:pointer; font-size:0.85rem; font-weight:600; display:flex; align-items:center; gap:6px; }
        .btn-primary { background:var(--accent); color:#fff; box-shadow:0 4px 14px rgba(196,127,59,0.35); }
        .btn-primary:hover { background:#b57330; }
        .btn-primary:disabled { background:#d4b896; cursor:not-allowed; }
        .btn-api { background:#e8f0fe; color:#1a73e8; border:2px solid #1a73e8; font-weight:700; }
        .btn-api:hover { background:#d2e3fc; }
        .btn-api.active { background:#1a73e8; color:#fff; }
        .content-area { flex:1; padding:20px 28px; overflow-y:auto; display:flex; flex-direction:column; gap:16px; }
        .prompt-section { background:var(--bg-card); border-radius:var(--radius-lg); padding:18px 20px; box-shadow:var(--shadow-md); border:1px solid var(--border-light); }
        .prompt-input { width:100%; padding:12px 16px; border:1.5px solid var(--border); border-radius:var(--radius-md); font-size:0.9rem; resize:none; background:var(--bg-editor); outline:none; }
        .param-chips { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; align-items:center; }
        .chip { padding:6px 13px; border-radius:20px; font-size:0.75rem; cursor:pointer; border:1.5px solid var(--border); background:var(--bg-card); color:var(--text-secondary); white-space:nowrap; }
        .chip.selected { background:var(--accent); color:#fff; border-color:var(--accent); }
        .chip.custom-length { display:flex; align-items:center; gap:4px; }
        .chip.custom-length input { border:none; background:transparent; outline:none; font-size:0.75rem; width:60px; color:inherit; font-weight:600; }
        .chip.custom-length input::placeholder { color:rgba(255,255,255,0.7); }
        .editor-section { flex:1; background:var(--bg-card); border-radius:var(--radius-lg); box-shadow:var(--shadow-md); border:1px solid var(--border-light); display:flex; flex-direction:column; overflow:hidden; min-height:400px; }
        .editor-toolbar { display:flex; gap:4px; padding:10px 14px; border-bottom:1px solid var(--border-light); background:var(--bg-secondary); flex-wrap:wrap; align-items:center; }
        .editor-toolbar button { width:32px; height:32px; border-radius:6px; border:none; background:transparent; cursor:pointer; font-size:0.85rem; color:var(--text-secondary); display:flex; align-items:center; justify-content:center; }
        .editor-toolbar button:hover { background:var(--bg-card); color:var(--accent); }
        .toolbar-rewrite { width:auto !important; padding:0 12px !important; font-size:0.78rem !important; gap:4px; }
        .editor-textarea { flex:1; width:100%; border:none; padding:20px; font-family:var(--font-editor); font-size:1.05rem; line-height:1.85; resize:none; background:var(--bg-editor); outline:none; }
        .ai-bubble { display:flex; align-items:flex-start; gap:10px; padding:12px 16px; background:#fefaf5; border-radius:var(--radius-md); border:1px solid #f5e8d5; animation:fadeInUp 0.4s; font-size:0.85rem; color:var(--text-secondary); margin:4px 0; }
        @keyframes fadeInUp { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .toast-container { position:fixed; top:20px; right:20px; z-index:9999; }
        .toast { background:#2c2416; color:#fff; padding:12px 20px; border-radius:24px; font-size:0.82rem; animation:toastIn 0.4s, toastOut 0.3s 2.5s forwards; }
        @keyframes toastIn { from{opacity:0;transform:translateX(40px)} to{opacity:1;transform:translateX(0)} }
        @keyframes toastOut { to{opacity:0;transform:translateX(40px)} }
        .settings-panel { display:none; position:fixed; top:70px; right:24px; background:var(--bg-card); border-radius:var(--radius-md); box-shadow:var(--shadow-lg); padding:20px; width:380px; max-width:90vw; z-index:200; border:1px solid var(--border); max-height:80vh; overflow-y:auto; }
        .settings-panel.active { display:block; }
        .settings-panel label { font-size:0.75rem; font-weight:600; color:var(--text-secondary); display:block; margin-top:8px; }
        .settings-panel input, .settings-panel select { width:100%; padding:8px 10px; border:1px solid var(--border); border-radius:6px; margin-top:4px; font-size:0.8rem; }
        .settings-panel small { font-size:0.65rem; color:var(--text-muted); display:block; margin-top:2px; }
        .overlay-bg { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.3); z-index:199; }
        .overlay-bg.active { display:block; }
        @media (max-width:860px) {
            .sidebar { position:fixed; left:0; top:0; transform:translateX(-100%); z-index:150; }
            .sidebar.open { transform:translateX(0); }
            .settings-panel { right:10px; width:90%; }
        }
    </style>
</head>
<body>
    <div class="overlay-bg" id="overlayBg" onclick="closeSettings()"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="ai-avatar-container" id="avatarContainer">
                <div class="ai-avatar-circle" id="avatarCircle"><span class="ai-face"></span></div>
                <div class="ai-status-dot" id="statusDot"></div>
            </div>
            <div class="ai-name">墨灵</div>
            <div class="ai-tagline">AI写作伙伴 · 拟人化改写</div>
        </div>
        <nav class="sidebar-nav">
            <span class="sidebar-nav-label">写作类型</span>
            <button class="type-btn active" data-type="essay" onclick="selectType('essay',this)">📝 论文</button>
            <button class="type-btn" data-type="novel" onclick="selectType('novel',this)">📖 小说</button>
            <button class="type-btn" data-type="prose" onclick="selectType('prose',this)">🍃 散文</button>
            <button class="type-btn" data-type="poetry" onclick="selectType('poetry',this)">🎐 诗歌</button>
            <button class="type-btn" data-type="copywriting" onclick="selectType('copywriting',this)">💼 文案</button>
            <button class="type-btn" data-type="script" onclick="selectType('script',this)">🎭 剧本</button>
        </nav>
        <div class="sidebar-footer">
            <button class="btn-outline" onclick="clearEditor()">🗑️ 清空编辑器</button>
            <button class="btn-outline" onclick="exportContent()">📥 导出文本</button>
            <button class="btn-outline" onclick="showHistory()">📋 历史 (<span id="historyCount">0</span>)</button>
        </div>
    </aside>

    <main class="main-area">
        <div class="topbar">
            <input type="text" class="doc-title-input" id="docTitle" placeholder="未命名文档">
            <span id="wordCountDisplay" style="font-size:0.85rem; color:var(--text-muted);">字数:0</span>
            <button class="btn btn-primary" id="btnGenerate" onclick="startGenerate()">✨ 开始写作</button>
            <button class="btn btn-api" id="btnApiToggle" onclick="toggleSettings()">
                🔑 <span id="apiStatusText">设置API</span>
            </button>
        </div>

        <!-- API设置面板 -->
        <div class="settings-panel" id="settingsPanel">
            <h3 style="margin-bottom:10px; color:var(--accent);">🔌 连接 AI 大脑 (最新模型)</h3>
            <p style="font-size:0.75rem; color:var(--text-muted); margin-bottom:12px;">
                选择平台自动填充最新模型，也可手动修改。
            </p>
            <label>🌐 快捷平台</label>
            <select id="platformSelect" onchange="onPlatformChange()">
                <option value="custom">自定义</option>
                <option value="openai">OpenAI</option>
                <option value="kimi">Kimi (Moonshot)</option>
                <option value="deepseek">DeepSeek</option>
                <option value="qwen">通义千问 (阿里)</option>
                <option value="zhipu">智谱 (ChatGLM)</option>
            </select>
            <label>🔑 API 密钥</label>
            <input type="password" id="apiKeyInput" placeholder="sk-...">
            <small>密钥仅保存在你的浏览器本地</small>
            <label>🔗 接口地址 (Base URL)</label>
            <input type="text" id="apiBaseInput" value="https://api.openai.com/v1">
            <label>🧠 模型名称</label>
            <select id="modelSelect" onchange="onModelSelectChange()">
                <option value="gpt-5.2">gpt-5.2</option>
                <option value="gpt-5.1">gpt-5.1</option>
                <option value="gpt-4o">gpt-4o</option>
                <option value="custom">自定义模型</option>
            </select>
            <input type="text" id="customModelInput" placeholder="输入模型ID" style="display:none; margin-top:4px;">
            <div style="display:flex; gap:8px; margin-top:12px;">
                <button class="btn btn-primary" onclick="saveAPISettings()">💾 保存设置</button>
                <button class="btn btn-outline" onclick="testAPIConnection()">🔍 测试连接</button>
            </div>
            <div id="apiStatusMsg" style="font-size:0.7rem; margin-top:6px;"></div>
        </div>

        <div class="content-area">
            <div class="prompt-section">
                <textarea class="prompt-input" id="promptInput" rows="2" placeholder="告诉墨灵你想写什么..."></textarea>
                <div class="param-chips">
                    <span style="font-size:0.7rem; font-weight:600; color:var(--text-muted);">风格:</span>
                    <span class="chip" data-param="style" data-val="academic" onclick="toggleChip(this)">学术</span>
                    <span class="chip" data-param="style" data-val="literary" onclick="toggleChip(this)">文学</span>
                    <span class="chip selected" data-param="style" data-val="natural" onclick="toggleChip(this)">自然</span>
                    <span class="chip" data-param="style" data-val="humorous" onclick="toggleChip(this)">幽默</span>
                    <span class="chip" data-param="style" data-val="humanized" onclick="toggleChip(this)">拟人</span>
                    <span style="margin:0 4px;">·</span>
                    <span style="font-size:0.7rem; font-weight:600; color:var(--text-muted);">字数:</span>
                    <span class="chip" data-param="length" data-val="short" onclick="setLength('short', this)">短篇(~500)</span>
                    <span class="chip selected" data-param="length" data-val="medium" onclick="setLength('medium', this)">中篇(~1500)</span>
                    <span class="chip" data-param="length" data-val="long" onclick="setLength('long', this)">长篇(~3000)</span>
                    <span class="chip custom-length" id="customLengthChip" onclick="activateCustomLength()">
                        自定义
                        <input type="number" id="customLengthInput" placeholder="字数" min="50" max="20000" style="display:none;" onkeydown="if(event.key==='Enter') confirmCustomLength()" onblur="confirmCustomLength()">
                    </span>
                    <span style="margin:0 4px;">·</span>
                    <span style="font-size:0.7rem; font-weight:600; color:var(--text-muted);">创意:</span>
                    <span class="chip" data-param="creativity" data-val="conservative" onclick="toggleChip(this)">保守</span>
                    <span class="chip selected" data-param="creativity" data-val="balanced" onclick="toggleChip(this)">平衡</span>
                    <span class="chip" data-param="creativity" data-val="creative" onclick="toggleChip(this)">大胆</span>
                </div>
            </div>
            <div id="aiBubbleArea"></div>
            <div class="editor-section">
                <div class="editor-toolbar">
                    <button onclick="insertMarkdown('**','**')"><b>B</b></button>
                    <button onclick="insertMarkdown('*','*')"><i>I</i></button>
                    <button onclick="insertMarkdown('\n## ','')">H</button>
                    <span style="width:1px; background:var(--border); margin:4px 6px;"></span>
                    <button class="toolbar-rewrite" onclick="humanizeRewrite()">🔄 改写</button>
                    <span style="margin-left:auto; font-size:0.7rem; color:var(--text-muted);">Markdown</span>
                </div>
                <textarea class="editor-textarea" id="editorTextarea" placeholder="AI生成的内容将出现在这里..." oninput="updateWordCount()"></textarea>
            </div>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        (function() {
            // 状态管理 (同前)
            const state = {
                currentType: 'essay',
                isGenerating: false,
                selectedParams: { style: 'natural', length: 'medium', creativity: 'balanced' },
                history: [],
                api: { platform: 'custom', key: '', baseURL: 'https://api.openai.com/v1', model: 'gpt-5.2' }
            };

            try { const savedApi = JSON.parse(localStorage.getItem('moli_api')); if (savedApi) state.api = { ...state.api, ...savedApi }; } catch(e) {}
            try { const savedParams = JSON.parse(localStorage.getItem('moli_params')); if (savedParams) state.selectedParams = savedParams; } catch(e) {}

            const $ = s => document.querySelector(s);
            const editor = $('#editorTextarea');
            const promptInput = $('#promptInput');
            const btnGen = $('#btnGenerate');
            const wordCountDisp = $('#wordCountDisplay');
            const aiBubble = $('#aiBubbleArea');
            const avatarCircle = $('#avatarCircle');
            const statusDot = $('#statusDot');
            const toastCont = $('#toastContainer');
            const apiStatusText = $('#apiStatusText');
            const btnApiToggle = $('#btnApiToggle');
            const customLengthChip = $('#customLengthChip');
            const customLengthInput = $('#customLengthInput');

            const sleep = ms => new Promise(r => setTimeout(r, ms));
            const showToast = msg => {
                const t = document.createElement('div'); t.className='toast'; t.textContent=msg;
                toastCont.appendChild(t); setTimeout(()=>t.remove(),3000);
            };
            const updateWordCount = () => {
                const text = editor.value.trim();
                const count = text.length > 0 ? text.replace(/\s/g,'').length : 0;
                wordCountDisp.textContent = `字数: ${count}`;
                if(!$('#docTitle').value && text) {
                    const line = text.split('\n')[0].replace(/^#+\s*/,'').trim();
                    if(line && line.length<50) $('#docTitle').value = line;
                }
            };
            const addBubble = text => {
                const d = document.createElement('div'); d.className='ai-bubble';
                d.innerHTML = `<div style="width:28px;height:28px;border-radius:50%;background:var(--accent-glow);text-align:center;line-height:28px;">🖋️</div><span>${text}</span>`;
                aiBubble.appendChild(d); d.scrollIntoView({behavior:'smooth',block:'nearest'});
                while(aiBubble.children.length>5) aiBubble.firstChild.remove();
            };

            // 历史记录（略）
            const loadHistory = () => {
                try { state.history = JSON.parse(localStorage.getItem('moli_history')) || []; } catch(e){}
                $('#historyCount').textContent = state.history.length;
            };
            const saveHistory = () => {
                const content = editor.value.trim();
                if(!content) return;
                const entry = {
                    id: Date.now(), title: $('#docTitle').value || '未命名',
                    type: state.currentType, content,
                    date: new Date().toLocaleString('zh-CN'),
                    preview: content.substring(0,150)+'...'
                };
                if(state.history[0]?.content === content) return;
                state.history.unshift(entry);
                if(state.history.length>20) state.history = state.history.slice(0,20);
                localStorage.setItem('moli_history', JSON.stringify(state.history));
                $('#historyCount').textContent = state.history.length;
            };

            window.selectType = (type, btn) => {
                state.currentType = type;
                document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('active'));
                btn.classList.add('active');
                const defaults = {
                    essay:{style:'academic',length:'long',creativity:'conservative'},
                    novel:{style:'literary',length:'medium',creativity:'creative'},
                    prose:{style:'literary',length:'medium',creativity:'balanced'},
                    poetry:{style:'literary',length:'short',creativity:'creative'},
                    copywriting:{style:'natural',length:'short',creativity:'balanced'},
                    script:{style:'natural',length:'medium',creativity:'creative'}
                };
                state.selectedParams = {...defaults[type] || {style:'natural',length:'medium',creativity:'balanced'}};
                updateParamsUI();
                const placeholders = {
                    essay:'例如：写一篇关于"数字时代隐私保护"的学术论文大纲',
                    novel:'例如：创作一个架空奇幻世界的开篇',
                    prose:'例如：写一篇秋日午后老街漫步的散文',
                    poetry:'例如：写一首关于月光与海的现代诗',
                    copywriting:'例如：为智能咖啡机撰写产品文案',
                    script:'例如：写一段雨夜咖啡馆重逢的对话'
                };
                promptInput.placeholder = placeholders[type] || '告诉墨灵你想写什么...';
                showToast(`已切换至「${btn.textContent.trim()}」模式`);
            };

            window.toggleChip = chip => {
                const param = chip.dataset.param;
                const val = chip.dataset.val;
                if (param === 'length') return;
                document.querySelectorAll(`.chip[data-param="${param}"]`).forEach(c=>c.classList.remove('selected'));
                chip.classList.add('selected');
                state.selectedParams[param] = val;
                localStorage.setItem('moli_params', JSON.stringify(state.selectedParams));
                showToast(`已选择: ${chip.textContent.trim()}`);
            };

            window.setLength = (length, chip) => {
                document.querySelectorAll(`.chip[data-param="length"]`).forEach(c=>c.classList.remove('selected'));
                if (length === 'custom') {
                    customLengthChip.classList.add('selected');
                    customLengthInput.style.display = 'inline-block';
                    customLengthInput.focus();
                } else {
                    chip.classList.add('selected');
                    customLengthChip.classList.remove('selected');
                    customLengthInput.style.display = 'none';
                    state.selectedParams.length = length;
                }
                localStorage.setItem('moli_params', JSON.stringify(state.selectedParams));
            };

            window.activateCustomLength = () => {
                if (customLengthChip.classList.contains('selected')) {
                    setLength('medium', document.querySelector('.chip[data-param="length"][data-val="medium"]'));
                    return;
                }
                setLength('custom', null);
            };

            window.confirmCustomLength = () => {
                const val = parseInt(customLengthInput.value);
                if (val && val >= 50 && val <= 20000) {
                    state.selectedParams.length = val.toString();
                    customLengthChip.classList.add('selected');
                    customLengthChip.childNodes[0].textContent = `自定义${val}字 `;
                    showToast(`字数已设为 ${val} 字`);
                } else if (customLengthInput.value.trim() !== '') {
                    showToast('字数范围50-20000，请输入有效数字');
                    customLengthInput.value = '';
                }
                localStorage.setItem('moli_params', JSON.stringify(state.selectedParams));
            };

            const updateParamsUI = () => {
                document.querySelectorAll('.chip[data-param="style"], .chip[data-param="creativity"]').forEach(c=>{
                    c.classList.toggle('selected', c.dataset.val === state.selectedParams[c.dataset.param]);
                });
                const lenVal = state.selectedParams.length;
                document.querySelectorAll('.chip[data-param="length"]').forEach(c=>c.classList.remove('selected'));
                if (lenVal === 'short' || lenVal === 'medium' || lenVal === 'long') {
                    const chip = document.querySelector(`.chip[data-param="length"][data-val="${lenVal}"]`);
                    if (chip) chip.classList.add('selected');
                    customLengthChip.classList.remove('selected');
                    customLengthInput.style.display = 'none';
                } else {
                    customLengthChip.classList.add('selected');
                    customLengthInput.style.display = 'inline-block';
                    customLengthInput.value = lenVal;
                    customLengthChip.childNodes[0].textContent = `自定义${lenVal}字 `;
                }
            };

            // 平台预设
            const platforms = {
                openai: { base: 'https://api.openai.com/v1', models: ['gpt-5.2', 'gpt-5.1', 'gpt-4o'], defaultModel: 'gpt-5.2' },
                kimi: { base: 'https://api.moonshot.cn/v1', models: ['kimi-k2.6', 'kimi-k2.5', 'kimi-k2.5-thinking'], defaultModel: 'kimi-k2.6' },
                deepseek: { base: 'https://api.deepseek.com/v1', models: ['deepseek-v4-pro', 'deepseek-v4-flash', 'deepseek-v3.2'], defaultModel: 'deepseek-v4-pro' },
                qwen: { base: 'https://dashscope.aliyuncs.com/compatible-mode/v1', models: ['qwen3.7-max', 'qwen3.7-plus', 'qwen3.6-max', 'qwen3.6-plus', 'qwen-turbo'], defaultModel: 'qwen3.7-max' },
                zhipu: { base: 'https://open.bigmodel.cn/api/paas/v4', models: ['GLM-4.7-Flash', 'GLM-4.7', 'GLM-4.5-Flash'], defaultModel: 'GLM-4.7-Flash' }
            };

            window.onPlatformChange = () => {
                const platform = $('#platformSelect').value;
                state.api.platform = platform;
                if (platform === 'custom') return;
                const p = platforms[platform];
                if (p) {
                    $('#apiBaseInput').value = p.base;
                    const modelSelect = $('#modelSelect');
                    modelSelect.innerHTML = '';
                    p.models.forEach(m => {
                        const opt = document.createElement('option');
                        opt.value = m;
                        opt.textContent = m;
                        modelSelect.appendChild(opt);
                    });
                    const customOpt = document.createElement('option');
                    customOpt.value = 'custom';
                    customOpt.textContent = '自定义模型';
                    modelSelect.appendChild(customOpt);
                    modelSelect.value = p.defaultModel;
                    $('#customModelInput').style.display = 'none';
                }
            };

            window.onModelSelectChange = () => {
                if ($('#modelSelect').value === 'custom') {
                    $('#customModelInput').style.display = 'block';
                    $('#customModelInput').focus();
                } else {
                    $('#customModelInput').style.display = 'none';
                }
            };

            const initSettingsPanel = () => {
                if (state.api.platform && state.api.platform !== 'custom') {
                    $('#platformSelect').value = state.api.platform;
                    onPlatformChange();
                    if (state.api.model) {
                        if ($('#modelSelect').querySelector(`option[value="${state.api.model}"]`)) {
                            $('#modelSelect').value = state.api.model;
                        } else {
                            $('#modelSelect').value = 'custom';
                            $('#customModelInput').style.display = 'block';
                            $('#customModelInput').value = state.api.model;
                        }
                    }
                } else {
                    $('#platformSelect').value = 'custom';
                    $('#apiBaseInput').value = state.api.baseURL;
                    if (state.api.model) {
                        if ($('#modelSelect').querySelector(`option[value="${state.api.model}"]`)) {
                            $('#modelSelect').value = state.api.model;
                        } else {
                            $('#modelSelect').value = 'custom';
                            $('#customModelInput').style.display = 'block';
                            $('#customModelInput').value = state.api.model;
                        }
                    }
                }
                if (state.api.key) {
                    $('#apiKeyInput').value = state.api.key.substring(0,5) + '...';
                }
            };

            window.toggleSettings = () => {
                $('#settingsPanel').classList.toggle('active');
                $('#overlayBg').classList.toggle('active');
                if ($('#settingsPanel').classList.contains('active')) {
                    initSettingsPanel();
                }
            };
            window.closeSettings = () => {
                $('#settingsPanel').classList.remove('active');
                $('#overlayBg').classList.remove('active');
            };

            window.saveAPISettings = () => {
                state.api.platform = $('#platformSelect').value;
                state.api.baseURL = $('#apiBaseInput').value.trim().replace(/\/+$/, '');
                const modelSelect = $('#modelSelect');
                state.api.model = modelSelect.value === 'custom' ? $('#customModelInput').value.trim() : modelSelect.value;
                const keyInput = $('#apiKeyInput').value.trim();
                if (keyInput && !keyInput.startsWith('...')) {
                    state.api.key = keyInput;
                }
                localStorage.setItem('moli_api', JSON.stringify(state.api));
                if (state.api.key) {
                    apiStatusText.textContent = '已连接';
                    btnApiToggle.classList.add('active');
                } else {
                    apiStatusText.textContent = '设置API';
                    btnApiToggle.classList.remove('active');
                }
                showToast('✅ API设置已保存');
                closeSettings();
            };

            window.testAPIConnection = async () => {
                const key = $('#apiKeyInput').value.trim();
                const base = $('#apiBaseInput').value.trim().replace(/\/+$/, '');
                if (!key || key.startsWith('...')) {
                    if (!state.api.key) return showToast('请先输入有效的API密钥');
                }
                const finalKey = key.startsWith('...') ? state.api.key : key;
                const statusDiv = $('#apiStatusMsg');
                statusDiv.textContent = '测试中...';
                try {
                    const res = await fetch(`${base}/models`, {
                        headers: { 'Authorization': `Bearer ${finalKey}` }
                    });
                    if (res.ok) {
                        statusDiv.textContent = '✅ 连接成功！';
                        showToast('API 连接正常');
                    } else {
                        const err = await res.text();
                        if (res.status === 401) {
                            statusDiv.textContent = '❌ 密钥无效，请检查是否正确复制（无空格）且未过期。';
                        } else {
                            statusDiv.textContent = `❌ 错误 ${res.status}: ${err.substring(0,100)}`;
                        }
                    }
                } catch(e) {
                    statusDiv.textContent = '❌ 网络错误';
                }
            };

            // ========== 核心生成（带友好错误处理） ==========
            const generateWithAPI = async (prompt, isRewrite = false, originalText = '') => {
                const styleMap = { academic:'严谨学术', literary:'优美文学', natural:'自然流畅', humorous:'幽默风趣', humanized:'拟人化口语' };
                const creativityMap = { conservative:'保守', balanced:'平衡', creative:'富有创意' };
                const typeNames = { essay:'学术论文', novel:'小说', prose:'散文', poetry:'诗歌', copywriting:'商业文案', script:'剧本' };
                const length = state.selectedParams.length;
                let lengthInstruction = '';
                if (!isRewrite) {
                    if (length === 'short') lengthInstruction = '约500字';
                    else if (length === 'medium') lengthInstruction = '约1500字';
                    else if (length === 'long') lengthInstruction = '约3000字';
                    else lengthInstruction = `约${length}字`;
                }

                let systemPrompt, userPrompt;
                if (isRewrite) {
                    systemPrompt = `你是一位擅长将枯燥文字转化为生动表达的语言大师。请对用户提供的原文进行拟人化改写，要求：结合口语化与专业化，语气亲切但不失深度；长短句交替；减少逻辑连接词；缩减主谓宾结构，多用倒装、省略等句式；适当运用修辞。直接输出改写后内容。`;
                    userPrompt = `请改写以下文字：\n${originalText}`;
                } else {
                    systemPrompt = `你是一位专业作家，擅长${typeNames[state.currentType]}写作。风格：${styleMap[state.selectedParams.style]}。创意度：${creativityMap[state.selectedParams.creativity]}。`;
                    if (state.selectedParams.style === 'humanized') {
                        systemPrompt += `请特别注意：采用拟人化口语风格，长短句交替，减少逻辑词堆叠，多用倒转句式。`;
                    }
                    systemPrompt += `请严格将输出字数控制在${lengthInstruction}左右。直接输出内容，不要解释。`;
                    userPrompt = prompt;
                }

                const body = {
                    model: state.api.model,
                    messages: [
                        { role: "system", content: systemPrompt },
                        { role: "user", content: userPrompt }
                    ],
                    temperature: state.selectedParams.creativity==='creative'?0.9: (state.selectedParams.creativity==='conservative'?0.3:0.7),
                };
                if (!isRewrite) {
                    if (length === 'short') body.max_tokens = 1200;
                    else if (length === 'medium') body.max_tokens = 3500;
                    else if (length === 'long') body.max_tokens = 7000;
                    else body.max_tokens = Math.ceil(parseInt(length) * 2.5);
                } else {
                    body.max_tokens = 4000;
                }

                const response = await fetch(`${state.api.baseURL}/chat/completions`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${state.api.key}`
                    },
                    body: JSON.stringify(body)
                });

                if (!response.ok) {
                    const errText = await response.text();
                    if (response.status === 401) {
                        throw new Error(`认证失败 (401)\n👉 请检查：\n① 密钥是否正确（无多余空格）\n② 是否选择了正确的平台（Kimi 请用 Moonshot）\n③ Base URL 是否匹配（Kimi为 https://api.moonshot.cn/v1）\n④ 密钥是否过期或余额不足`);
                    }
                    throw new Error(`API错误 ${response.status}: ${errText}`);
                }
                const data = await response.json();
                return data.choices[0].message.content;
            };

            const generateMock = (prompt) => {
                const topic = prompt.replace(/[写一篇|创作|请|帮我|关于]/g,'').trim().substring(0,20)||'未命名';
                const t = state.currentType;
                const base = {
                    essay: `# ${topic}\n\n## 摘要\n本文围绕"${topic}"展开系统分析...`,
                    novel: `# ${topic}\n\n秋风渐起，梧桐叶落。他站在老宅门前...`,
                    prose: `# ${topic}\n\n小镇的清晨总是慢半拍。石板路湿漉漉的...`,
                    poetry: `# ${topic}\n\n月光洒在旧书页上，\n字迹模糊成一片海。`,
                    copywriting: `# ${topic} 文案\n\n**极致体验** · **匠心设计**\n${topic}，让生活更有温度。`,
                    script: `# ${topic}\n\n【咖啡馆·傍晚】\n沈默：我以为你不会来了。\n苏晚：雨太大了。`
                };
                return base[t] || `# ${topic}\n\n创作中...`;
            };

            window.startGenerate = async () => {
                if(state.isGenerating) return;
                const prompt = promptInput.value.trim();
                if(!prompt) { showToast('请先输入写作主题'); return; }

                state.isGenerating = true;
                btnGen.disabled = true;
                btnGen.innerHTML = '⏳ 写作中...';
                avatarCircle.classList.add('thinking'); statusDot.classList.add('busy');
                aiBubble.innerHTML = '';
                addBubble('正在构思，请稍候...');

                try {
                    let content = '';
                    if(state.api.key && state.api.key.length>5) {
                        addBubble('已连接AI，正在生成...');
                        content = await generateWithAPI(prompt);
                    } else {
                        await sleep(1500);
                        content = generateMock(prompt);
                    }
                    avatarCircle.classList.remove('thinking');
                    avatarCircle.classList.add('writing');
                    for(let i=0; i<content.length; i++) {
                        editor.value += content[i];
                        editor.scrollTop = editor.scrollHeight;
                        updateWordCount();
                        await sleep(15 + Math.random()*10);
                    }
                } catch(e) {
                    addBubble(`❌ 生成失败：${e.message}`);
                } finally {
                    avatarCircle.classList.remove('writing','thinking');
                    statusDot.classList.remove('busy');
                    state.isGenerating = false;
                    btnGen.disabled = false;
                    btnGen.innerHTML = '✨ 开始写作';
                    if(editor.value.trim()) {
                        addBubble('完成！你可以继续修改或重新生成。');
                        saveHistory();
                    }
                }
            };

            // 改写功能
            window.humanizeRewrite = async () => {
                const start = editor.selectionStart;
                const end = editor.selectionEnd;
                const selectedText = editor.value.substring(start, end);
                if (!selectedText.trim()) { showToast('请选中文字'); return; }
                if (state.isGenerating) { showToast('正在生成中...'); return; }

                state.isGenerating = true;
                btnGen.disabled = true;
                avatarCircle.classList.add('thinking'); statusDot.classList.add('busy');
                addBubble('🔄 拟人化改写中...');
                try {
                    let newText = '';
                    if (state.api.key && state.api.key.length > 5) {
                        newText = await generateWithAPI('', true, selectedText);
                    } else {
                        await sleep(1200);
                        newText = `【拟人化改写示例】\n${selectedText.slice(0,30)}... 变成了有温度的诉说，长短错落，逻辑词隐去。`;
                    }
                    editor.setRangeText(newText, start, end, 'select');
                    updateWordCount();
                    addBubble('✨ 改写完成');
                } catch (e) {
                    addBubble(`❌ 改写失败：${e.message}`);
                } finally {
                    avatarCircle.classList.remove('thinking');
                    statusDot.classList.remove('busy');
                    state.isGenerating = false;
                    btnGen.disabled = false;
                }
            };

            // 其他功能（略）
            $('#avatarContainer').addEventListener('click', ()=>{
                if(state.isGenerating) { state.isGenerating = false; addBubble('⏸️ 已中止'); }
                else { addBubble(['嗨！','有灵感了吗？','试试拟人化改写吧~'][Math.floor(Math.random()*3)]); }
            });

            document.addEventListener('keydown', e => {
                if((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); startGenerate(); }
                if((e.ctrlKey||e.metaKey) && e.key==='s') { e.preventDefault(); saveHistory(); showToast('💾 已保存'); }
            });

            window.insertMarkdown = (before,after) => {
                const start = editor.selectionStart, end = editor.selectionEnd;
                editor.setRangeText(before+editor.value.substring(start,end)+after, start, end, 'select');
                editor.focus(); updateWordCount();
            };
            window.clearEditor = () => {
                if(editor.value.trim() && !confirm('确定清空吗？')) return;
                editor.value = ''; $('#docTitle').value = ''; updateWordCount(); aiBubble.innerHTML = '';
            };
            window.exportContent = () => {
                if(!editor.value.trim()) return showToast('编辑器为空');
                const blob = new Blob([editor.value], {type:'text/plain;charset=utf-8'});
                const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
                a.download = ($('#docTitle').value||'未命名')+'.txt'; a.click();
            };
            window.showHistory = () => {
                if(!state.history.length) return showToast('暂无历史');
                const list = state.history.slice(0,8).map((h,i)=>`${i+1}. ${h.title} - ${h.date}`).join('\n');
                const idx = prompt(`输入序号加载：\n${list}`);
                if(idx>0 && idx<=state.history.length){
                    const h = state.history[idx-1];
                    editor.value = h.content; $('#docTitle').value = h.title;
                    state.currentType = h.type; updateWordCount(); updateParamsUI();
                }
            };

            loadHistory();
            updateWordCount();
            updateParamsUI();
            if (state.api.key) { apiStatusText.textContent = '已连接'; btnApiToggle.classList.add('active'); }
        })();
    </script>
</body>
</html>
